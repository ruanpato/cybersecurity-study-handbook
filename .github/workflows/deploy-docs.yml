name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MKDOCS_SOCIAL: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.x"

      - name: Install image libraries
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install MkDocs Material
        run: pip install "mkdocs-material[imaging]"

      - name: Stage docs
        run: |
          rm -rf site-src
          mkdir -p site-src
          cp -R en-US pt-BR site-src/
          cp README.md site-src/index.md
          cp LICENSE LICENSE-CODE SECURITY.md CODE_OF_CONDUCT.md site-src/

      - name: Build site
        run: mkdocs build

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
        id: deployment
