name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # markdownlint + cspell + bilingual parity, using the exact versions pinned in
  # package-lock.json (single source of truth shared with the local hooks).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run lint

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--config lychee.toml --no-progress './**/*.md'"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - run: pip install mkdocs-material
      - name: Stage docs
        run: |
          rm -rf site-src && mkdir -p site-src
          cp -R en-US pt-BR site-src/
          cp README.md site-src/index.md
          cp LICENSE LICENSE-CODE SECURITY.md CODE_OF_CONDUCT.md site-src/
      # Non-strict: relative links like ../README.md are valid on GitHub but don't
      # map into the staged site; link integrity is covered by the `links` job.
      - run: mkdocs build

  # Validate PR commit messages. Not run on push: a force-push/rewrite has no common
  # ancestor to diff against, and direct pushes are covered by the local husky hook.
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
